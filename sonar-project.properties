# SonarQube Configuration for Hostel Management System

sonar.projectKey=hostel-management
sonar.projectName=Hostel Management System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=client/src,server/src
sonar.tests=server/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js,**/public/**,**/uploads/**,**/logs/**

# Test exclusions
sonar.test.exclusions=**/__tests__/**,**/tests/**

# JavaScript/TypeScript specific
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,**/tests/**,**/__tests__/**,**/coverage/**

# Code smell suppressions
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# Suppress: "The empty object is useless" - These are defensive programming checks
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S1116
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# Suppress: "Extract this nested ternary operation" - React patterns
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S3358
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*

# Suppress: TODO comments - Tracked in issue tracker
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S1135
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*

# Suppress: Array index in keys - React list rendering with stable data
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:S6486
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*

# Suppress: Cognitive complexity - Complex business logic
sonar.issue.ignore.multicriteria.e5.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=js

# Scanner properties
sonar.verbose=false
