# SonarQube Configuration for Hostel Management Client

# Project identification
sonar.projectKey=hostel-management-client
sonar.projectName=Hostel Management - Client
sonar.projectVersion=1.0

# Source directory
sonar.sources=src

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.test.jsx

# JavaScript/TypeScript specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ============================================================================
# IMPORTANT: After modifying this file, re-run SonarQube analysis to apply changes
# ============================================================================

# Disable specific rules that are false positives
# Note: To find the exact rule keys, check SonarQube error messages or documentation

# Multiple criteria for ignoring issues
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# 1. Motion.* components (Framer Motion library design - lowercase is intentional)
# This suppresses "Component name should be PascalCase" warnings for motion.div, motion.button, etc.
e1.ruleKey=react/jsx-pascal-case
e1.resourceKey=**/*.jsx

# 2. PropTypes validation (modern React uses JSDoc/TypeScript instead)
# This suppresses "prop is missing in props validation" warnings
e2.ruleKey=react/prop-types
e2.resourceKey=**/*.jsx

# 3. Prefer globalThis over window (window is standard in browser contexts)
# This suppresses "Use globalThis instead of window" warnings
e3.ruleKey=no-restricted-globals
e3.resourceKey=**/*.jsx

# 4. Tailwind CSS @apply directives (valid Tailwind syntax)
# This suppresses "Unknown at-rule" warnings in CSS files
e4.ruleKey=css:S4667
e4.resourceKey=**/*.css

# 5. Consistent return type (React components can return different elements)
# This suppresses "should always return the same type" for conditional rendering
e5.ruleKey=consistent-return
e5.resourceKey=**/*.jsx

